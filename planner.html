<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI旅行プランナー | SURGE Travel - あなただけの旅程を自動生成</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="https://trip.surge.f5.si/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://trip.surge.f5.si/favicon2.png">
<meta name="description" content="SURGEの高度なAIが、目的地やあなたの好みに合わせて最適な旅行プランを数秒で作成。空港の過ごし方から現地の穴場スポットまで、知的な旅をサポートします。">
<meta name="keywords" content="AI旅行プラン, 旅行計画 自動作成, AIプランナー, SURGE Travel, 旅程作成, 旅行アプリ">
<meta property="og:title" content="AI旅行プランナー | SURGE Travel">
<meta property="og:description" content="「どこで、何をしたいか」を入力するだけ。AIがあなた専用の旅をデザインします。">
<meta property="og:url" content="https://trip.surge.f5.si/planner.html">
<meta property="og:image" content="https://trip.surge.f5.si/favicon.png">
<meta name="twitter:card" content="summary">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --accent: #0071e3; --bg: #ffffff; --card: #f5f5f7; --text: #1d1d1f; }
        body { margin: 0; font-family: 'Noto Sans JP', 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        
        .header-minimal { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f2f2f7; }
        .back-link { text-decoration: none; color: #86868b; font-weight: 700; font-size: 14px; transition: 0.3s; }
        .back-link:hover { color: var(--text); }
        
        .main-container { max-width: 800px; margin: 0 auto; padding: 60px 24px 100px; }
        h2 { font-size: 32px; font-weight: 900; margin-bottom: 48px; letter-spacing: -1px; }

        .input-group { margin-bottom: 32px; }
        .input-group label { display: block; font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 12px; letter-spacing: 1px; }
        input, select, textarea { width: 100%; border: 1.5px solid #d2d2d7; border-radius: 16px; padding: 18px; font-size: 16px; font-weight: 500; box-sizing: border-box; outline: none; transition: 0.3s; font-family: inherit; background: #fff; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }

        .btn-gen { width: 100%; background: #000; color: white; border: none; padding: 22px; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .btn-gen:hover { transform: translateY(-2px); background: var(--accent); }

        /* 結果エリア */
        #resultArea { display: none; margin-top: 80px; border-top: 2px solid #f2f2f7; padding-top: 60px; }
        .day-card { margin-bottom: 60px; }
        .day-title { font-size: 26px; font-weight: 900; margin-bottom: 32px; display: flex; align-items: center; gap: 15px; }
        .day-title span { background: var(--accent); color: #fff; font-size: 14px; padding: 4px 12px; border-radius: 8px; }

        .event-node { display: flex; gap: 24px; margin-bottom: 32px; position: relative; }
        .event-node::before { content: ''; position: absolute; left: 11px; top: 25px; bottom: -15px; width: 2px; background: #e5e5e5; }
        .event-node:last-child::before { display: none; }
        
        .time-badge { min-width: 65px; height: 26px; background: #f5f5f7; color: var(--text); border-radius: 13px; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; z-index: 1; }
        
        .spot-info { flex: 1; }
        .spot-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .spot-info h4 { margin: 0; font-size: 19px; font-weight: 800; }
        .btn-map { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 700; border: 1.5px solid var(--accent); padding: 4px 12px; border-radius: 8px; transition: 0.2s; }
        .btn-map:hover { background: var(--accent); color: #fff; }
        
        /* 持ち物セクション */
        .items-card { background: #f5f5f7; border-radius: 24px; padding: 32px; margin-top: 40px; }
        .items-card h3 { margin: 0 0 20px; font-size: 20px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
        .item-tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .item-tag { background: #fff; padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: 700; border: 1px solid #d2d2d7; }

        #loader { display: none; text-align: center; padding: 80px 0; }
        .shimmer { width: 48px; height: 48px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header-minimal">
        <a href="index.html" class="back-link"><i class="fas fa-chevron-left"></i> ホームへ戻る</a>
        <div style="font-weight: 900; font-family: 'Plus Jakarta Sans';">SURGE AI</div>
    </div>

    <div class="main-container">
        <h2>旅のプランを構築する。</h2>
        
        <div class="input-group">
            <label>目的地</label>
            <input type="text" id="dest" placeholder="例：羽田空港、秋葉原、京都など">
        </div>

        <div style="display: flex; gap: 20px;">
            <div class="input-group" style="flex: 1;">
                <label>期間</label>
                <select id="duration">
                    <option value="日帰り">日帰り</option>
                    <option value="1泊2日" selected>1泊2日</option>
                    <option value="2泊3日">2泊3日</option>
                </select>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>予算</label>
                <select id="budget">
                    <option value="節約">節約</option>
                    <option value="標準" selected>標準</option>
                    <option value="贅沢">贅沢</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>こだわり</label>
            <textarea id="notes" rows="4" placeholder="例：飛行機が見えるスポット、静かにくつろげる場所など..."></textarea>
        </div>

        <button class="btn-gen" onclick="generate()">AIプランを生成</button>

        <div id="loader">
            <div class="shimmer"></div>
            <p>最適なルートと持ち物を解析中...</p>
        </div>

        <div id="resultArea">
            <div id="mainPlan"></div>
            <div id="itemBox" class="items-card" style="display:none;">
                <h3><i class="fas fa-suitcase"></i> おすすめの持ち物</h3>
                <div id="itemList" class="item-tags"></div>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://trip.proluce.workers.dev";

        async function generate() {
            const dest = document.getElementById('dest').value;
            if(!dest) return alert("目的地を入力してください。");

            document.getElementById('loader').style.display = 'block';
            document.getElementById('resultArea').style.display = 'none';

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: `${dest}への旅行。期間:${document.getElementById('duration').value}。予算:${document.getElementById('budget').value}。要望:${document.getElementById('notes').value}。出力は必ず以下のJSON形式で。{ "days": [ { "day": 1, "title": "タイトル", "events": [ { "time": "10:00", "spot": "場所", "desc": "説明" } ] } ], "items": ["持ち物1", "持ち物2"] }`
                    })
                });

                const rawData = await response.json();
                let aiText = rawData.plan || (Array.isArray(rawData) ? rawData[0].generated_text : JSON.stringify(rawData));
                
                const startIdx = aiText.indexOf('{');
                const endIdx = aiText.lastIndexOf('}');
                const plan = JSON.parse(aiText.substring(startIdx, endIdx + 1));

                render(plan);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('resultArea').style.display = 'block';
                window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 100, behavior: 'smooth' });
                
            } catch (e) {
                alert("エラーが発生しました。");
                document.getElementById('loader').style.display = 'none';
            }
        }

        function render(plan) {
            // プラン描画
            document.getElementById('mainPlan').innerHTML = (plan.days || []).map(d => `
                <div class="day-card">
                    <div class="day-title"><span>DAY ${d.day}</span> ${d.title}</div>
                    ${(d.events || []).map(e => `
                        <div class="event-node">
                            <div class="time-badge">${e.time}</div>
                            <div class="spot-info">
                                <div class="spot-header">
                                    <h4>${e.spot}</h4>
                                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e.spot)}" target="_blank" class="btn-map"><i class="fas fa-map-marker-alt"></i> Map</a>
                                </div>
                                <p>${e.desc}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');

            // 持ち物描画
            if(plan.items && plan.items.length > 0) {
                document.getElementById('itemBox').style.display = 'block';
                document.getElementById('itemList').innerHTML = plan.items.map(i => `<div class="item-tag">${i}</div>`).join('');
            }
        }

        // ページ読み込み時にURLパラメータを確認する
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const destParam = urlParams.get('dest');
    if (destParam) {
        document.getElementById('dest').value = destParam;
    }
}

        window.onload = function() {
    // URLのパラメータ（?dest=...&notes=...）を取得
    const urlParams = new URLSearchParams(window.location.search);
    
    // 1. 目的地の入力欄（id="dest"）への反映
    const destParam = urlParams.get('dest');
    if (destParam) {
        const destInput = document.getElementById('dest');
        if (destInput) {
            destInput.value = destParam;
        }
    }
    
    // 2. こだわり・要望の入力欄（id="notes"）への反映
    const notesParam = urlParams.get('notes');
    if (notesParam) {
        const notesInput = document.getElementById('notes');
        if (notesInput) {
            notesInput.value = notesParam;
        }
    }

};
    </script>
</body>
</html>
