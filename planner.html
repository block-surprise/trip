<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner | SURGE Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0071e3; --bg: #ffffff; --card: #f5f5f7; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; background: var(--bg); color: #1d1d1f; }
        .header-minimal { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; }
        .back-link { text-decoration: none; color: #86868b; font-weight: 600; font-size: 14px; }
        
        .main-container { max-width: 800px; margin: 0 auto; padding: 0 20px 100px; }
        h2 { font-size: 32px; font-weight: 900; margin-bottom: 40px; letter-spacing: -1px; }

        .input-group { margin-bottom: 30px; }
        .input-group label { display: block; font-size: 12px; font-weight: 800; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; border: 1.5px solid #d2d2d7; border-radius: 16px; padding: 18px; font-size: 16px; font-weight: 600; box-sizing: border-box; outline: none; transition: 0.3s; font-family: inherit; }
        input:focus { border-color: var(--accent); }

        .btn-gen { width: 100%; background: var(--accent); color: white; border: none; padding: 22px; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(0,113,227,0.2); transition: 0.3s; }
        .btn-gen:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0,113,227,0.3); }

        /* Result Area */
        #resultArea { display: none; margin-top: 60px; border-top: 1px solid #d2d2d7; padding-top: 40px; }
        .day-card { margin-bottom: 40px; }
        .day-title { font-size: 24px; font-weight: 800; margin-bottom: 25px; }
        .event-node { display: flex; gap: 30px; margin-bottom: 30px; position: relative; }
        .event-node::before { content: ''; position: absolute; left: 11px; top: 25px; bottom: -15px; width: 2px; background: #e5e5e5; }
        .event-node:last-child::before { display: none; }
        .time-badge { min-width: 60px; height: 24px; background: #000; color: #fff; border-radius: 12px; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; z-index: 1; }
        .spot-info h4 { margin: 0 0 5px; font-size: 18px; font-weight: 800; }
        .spot-info p { margin: 0; font-size: 14px; color: #86868b; line-height: 1.6; }

        #loader { display: none; text-align: center; padding: 60px; }
        .shimmer { width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header-minimal">
        <a href="index.html" class="back-link"><i class="fas fa-chevron-left"></i> Home</a>
        <div style="font-weight: 900; letter-spacing: -1px;">SURGE Intelligence</div>
    </div>

    <div class="main-container">
        <h2>Plan your journey.</h2>
        
        <div class="input-group">
            <label>Destination</label>
            <input type="text" id="dest" placeholder="どこへ向かいますか？">
        </div>

        <div style="display: flex; gap: 20px;">
            <div class="input-group" style="flex: 1;">
                <label>Duration</label>
                <select id="duration">
                    <option value="1日">日帰り</option>
                    <option value="1泊2日">1泊2日</option>
                    <option value="2泊3日">2泊3日</option>
                </select>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Budget</label>
                <select id="budget">
                    <option value="節約">Minimal</option>
                    <option value="標準" selected>Standard</option>
                    <option value="贅沢">Luxury</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Special Requests</label>
            <textarea id="notes" rows="4" placeholder="こだわりを入力してください（例：空港の撮影ポイント、筆記具専門店、静かなカフェ...）"></textarea>
        </div>

        <button class="btn-gen" onclick="generate()">AIプランを構築する</button>

        <div id="loader">
            <div class="shimmer"></div>
            <p style="margin-top: 20px; font-weight: 600; color: #86868b;">Analyzing global data...</p>
        </div>

        <div id="resultArea">
            <div id="mainPlan"></div>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://trip.proluce.workers.dev";

        async function generate() {
            const destination = document.getElementById('dest').value;
            if(!destination) return alert("目的地を入力してください。");

            document.getElementById('loader').style.display = 'block';
            document.getElementById('resultArea').style.display = 'none';

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: `${destination}への旅行。期間:${document.getElementById('duration').value}。予算:${document.getElementById('budget').value}。要望:${document.getElementById('notes').value}。必ずJSON形式で出力。`
                    })
                });

                const rawData = await response.json();
                let aiText = rawData.plan || (Array.isArray(rawData) ? rawData[0].generated_text : JSON.stringify(rawData));
                const startIdx = aiText.indexOf('{');
                const endIdx = aiText.lastIndexOf('}');
                const plan = JSON.parse(aiText.substring(startIdx, endIdx + 1));

                render(plan);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('resultArea').style.display = 'block';
            } catch (e) {
                alert("エラーが発生しました。");
                document.getElementById('loader').style.display = 'none';
            }
        }

        function render(plan) {
            document.getElementById('mainPlan').innerHTML = (plan.days || []).map(d => `
                <div class="day-card">
                    <div class="day-title">Day ${d.day} / ${d.title}</div>
                    ${(d.events || []).map(e => `
                        <div class="event-node">
                            <div class="time-badge">${e.time}</div>
                            <div class="spot-info">
                                <h4>${e.spot}</h4>
                                <p>${e.desc}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }
    </script>
</body>
