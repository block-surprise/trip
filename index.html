<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURGE Travel | Intelligent Itinerary</title>
    <!-- アイコン & フォント -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --accent: #007aff;
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
            --radius-lg: 24px;
            --radius-sm: 14px;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', -apple-system, "SF Pro JP", sans-serif;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        /* Header */
        header { text-align: center; margin-bottom: 50px; }
        header h1 { font-size: 48px; font-weight: 800; letter-spacing: -1.5px; margin: 0; color: var(--text-main); }
        header p { color: var(--text-sub); font-size: 18px; margin-top: 8px; font-weight: 500; }

        /* Bento Grid Input */
        .bento-input {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 120px;
            gap: 16px;
            margin-bottom: 60px;
        }

        .input-card {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .input-card label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .input-card input, .input-card select, .input-card textarea {
            width: 100%; border: none; background: transparent; font-size: 18px; 
            font-weight: 600; color: var(--text-main); outline: none; font-family: inherit;
        }

        /* Span settings */
        .dest { grid-column: span 2; }
        .days { grid-column: span 1; }
        .budget { grid-column: span 1; }
        .notes { grid-column: span 3; grid-row: span 1; }
        
        .exec-btn {
            grid-column: span 1;
            background: var(--accent);
            color: white;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            font-size: 20px;
        }
        .exec-btn:hover { transform: scale(0.96); filter: brightness(1.1); box-shadow: 0 15px 30px rgba(0,122,255,0.3); }
        .exec-btn:disabled { background: var(--text-sub); cursor: not-allowed; }

        /* Result Grid */
        #planOutput {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            display: none;
        }

        .day-card {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .day-card h3 { 
            font-size: 22px; margin: 0 0 4px 0; font-weight: 800; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .day-card h3 span { color: var(--accent); font-size: 14px; }
        .day-tagline { color: var(--text-sub); font-size: 13px; margin-bottom: 24px; font-weight: 600; }

        .timeline { border-left: 2px solid #f2f2f7; margin-left: 4px; padding-left: 20px; }
        .event { position: relative; margin-bottom: 24px; }
        .event::before {
            content: ''; position: absolute; left: -27px; top: 6px;
            width: 12px; height: 12px; background: var(--accent);
            border-radius: 50%; border: 3px solid white;
        }
        .e-time { font-weight: 800; font-size: 13px; color: var(--text-main); display: block; }
        .e-spot { font-weight: 700; font-size: 16px; display: block; margin: 2px 0; }
        .e-desc { font-size: 14px; color: var(--text-sub); margin: 0; line-height: 1.5; }

        .advice-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #007aff, #00c6ff);
            color: white;
            padding: 30px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Loading */
        #loader { display: none; text-align: center; padding: 50px; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(0,122,255,0.1);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .bento-input { grid-template-columns: 1fr 1fr; grid-auto-rows: auto; }
            .dest, .notes { grid-column: span 2; }
            header h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SURGE Travel</h1>
        <p>Your journey, intelligently designed.</p>
    </header>

    <div class="bento-input">
        <div class="input-card dest">
            <label>Destination</label>
            <input type="text" id="destination" placeholder="Where to?">
        </div>
        <div class="input-card days">
            <label>Days</label>
            <select id="duration">
                <option value="1日">1 Day</option>
                <option value="1泊2日" selected>2 Days</option>
                <option value="2泊3日">3 Days</option>
            </select>
        </div>
        <div class="input-card budget">
            <label>Budget</label>
            <select id="budget">
                <option value="学生・節約">Eco</option>
                <option value="標準">Standard</option>
                <option value="贅沢">Luxury</option>
            </select>
        </div>
        <div class="input-card notes">
            <label>Personal Interests</label>
            <textarea id="notes" placeholder="例：空港が見える場所、文房具巡り、静かなカフェ..."></textarea>
        </div>
        <button class="exec-btn" id="runBtn" onclick="generate()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p style="font-weight: 600; color: var(--text-sub);">AI is designing your perfect itinerary...</p>
    </div>

    <div id="planOutput"></div>
</div>

<script>
    const WORKER_URL = "https://trip.proluce.workers.dev";

    async function generate() {
        const dest = document.getElementById('destination').value;
        if(!dest) return alert("Please enter a destination.");

        const btn = document.getElementById('runBtn');
        const loader = document.getElementById('loader');
        const output = document.getElementById('planOutput');

        btn.disabled = true;
        loader.style.display = 'block';
        output.style.display = 'none';

        const prompt = `
以下の条件で旅行プランを作成し、必ず【有効なJSON形式】のみで出力してください。
条件: 目的地=${dest}, 期間=${document.getElementById('duration').value}, 予算=${document.getElementById('budget').value}, 要望=${document.getElementById('notes').value}

【重要】出力は以下のJSON構造にしてください。
{
  "days": [
    {
      "day": 1,
      "tagline": "テーマ",
      "events": [
        {"time": "09:00", "spot": "場所名", "desc": "説明"}
      ]
    }
  ],
  "advice": "1行アドバイス"
}
`;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            
            const data = await response.json();
            
            // Workersのレスポンス形式に合わせてパース
            let aiMsg = Array.isArray(data) ? data[0].generated_text : (data.plan || data);
            const jsonPart = aiMsg.match(/\{[\s\S]*\}/)[0];
            const plan = JSON.parse(jsonPart);

            render(plan);
            output.style.display = 'grid';
        } catch (e) {
            console.error(e);
            alert("Error generating plan. Check console.");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }

    function render(data) {
        const output = document.getElementById('planOutput');
        output.innerHTML = data.days.map(d => `
            <div class="day-card">
                <h3>Day ${d.day} <span><i class="fas fa-chevron-right"></i></span></h3>
                <div class="day-tagline">${d.tagline}</div>
                <div class="timeline">
                    ${d.events.map(e => `
                        <div class="event">
                            <span class="e-time">${e.time}</span>
                            <span class="e-spot">${e.spot}</span>
                            <p class="e-desc">${e.desc}</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');

        output.innerHTML += `
            <div class="advice-card">
                <i class="fas fa-lightbulb fa-2x"></i>
                <div>
                    <strong style="display:block; font-size:14px; text-transform:uppercase; opacity:0.8;">Expert Advice</strong>
                    <span style="font-size:18px; font-weight:600;">${data.advice}</span>
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
