<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURGE Travel | AI旅行計画</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --primary: #0071e3; /* クリーンなブルー */
            --accent: #ff9500; /* オレンジ（アクセント） */
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --radius: 20px;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 40px 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 32px; font-weight: 900; margin: 0; color: var(--primary); }
        header p { color: var(--text-sub); font-size: 16px; margin-top: 5px; }

        /* 入力エリア（Bento Grid） */
        .bento-input {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(100px, auto);
            gap: 15px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .card label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        input, select, textarea {
            width: 100%; border: none; background: transparent; font-size: 16px; 
            font-weight: 500; color: var(--text-main); outline: none; font-family: inherit;
        }

        /* 配置設定 */
        .span-2 { grid-column: span 2; }
        .span-4 { grid-column: span 4; }
        
        .exec-btn {
            grid-column: span 1;
            background: var(--primary);
            color: white;
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        .exec-btn:hover { background: #005bb7; transform: translateY(-2px); }

        /* 結果エリア */
        #planOutput { display: none; }
        .result-grid {
            display: grid;
            grid-template-columns: 2fr 1fr; /* スケジュールと詳細情報 */
            gap: 20px;
        }

        .day-box {
            background: var(--card);
            border-radius: var(--radius);
            padding: 25px;
            margin-bottom: 20px;
        }
        .day-title { font-size: 20px; font-weight: 900; color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }

        .event { display: flex; gap: 15px; margin-bottom: 15px; position: relative; }
        .time { font-weight: 700; color: var(--primary); min-width: 50px; }
        .spot-info { flex: 1; }
        .spot-name { font-weight: 700; font-size: 16px; display: block; }
        .spot-desc { font-size: 14px; color: var(--text-sub); }

        /* サイドバーの情報カード */
        .info-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid var(--accent);
        }
        .info-card h4 { margin: 0 0 10px 0; font-size: 16px; color: var(--text-main); }
        .list-item { font-size: 14px; margin-bottom: 5px; color: var(--text-sub); }

        /* ローディング */
        #loader { display: none; text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 800px) {
            .bento-input, .result-grid { grid-template-columns: 1fr; }
            .span-2, .span-4 { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SURGE Travel</h1>
        <p>AIによるインテリジェントな旅行設計</p>
    </header>

    <div class="bento-input">
        <div class="card span-2">
            <label>目的地</label>
            <input type="text" id="destination" placeholder="例：北海道、金沢、羽田空港周辺など">
        </div>
        <div class="card">
            <label>日数</label>
            <select id="duration">
                <option value="日帰り">日帰り</option>
                <option value="1泊2日" selected>1泊2日</option>
                <option value="2泊3日">2泊3日</option>
            </select>
        </div>
        <div class="card">
            <label>予算</label>
            <select id="budget">
                <option value="節約（学生）">節約（学生）</option>
                <option value="標準">標準</option>
                <option value="贅沢">贅沢</option>
            </select>
        </div>
        <div class="card span-2">
            <label>こだわり・趣味（文房具、空港、撮影など）</label>
            <textarea id="notes" placeholder="こだわりを入力（例：0.5mmのシャーペンが充実した店、飛行機が見えるカフェ）"></textarea>
        </div>
        <div class="card">
            <label>同行者</label>
            <select id="who">
                <option value="一人旅">一人旅</option>
                <option value="友達と">友達と</option>
                <option value="家族と">家族と</option>
            </select>
        </div>
        <button class="exec-btn" onclick="generate()">
            <i class="fas fa-magic" style="font-size: 20px;"></i>
            <span style="font-weight: 700; margin-top: 5px;">計画作成</span>
        </button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p>AIが最適なルートを計算しています...</p>
    </div>

    <div id="planOutput">
        <div class="result-grid">
            <!-- スケジュール（左側） -->
            <div id="mainPlan"></div>

            <!-- 追加情報（右側） -->
            <div id="sideInfo">
                <div class="info-card">
                    <h4><i class="fas fa-wallet"></i> 推定予算</h4>
                    <div id="budgetInfo"></div>
                </div>
                <div class="info-card" style="border-left-color: #34c759;">
                    <h4><i class="fas fa-luggage-cart"></i> 持ち物チェックリスト</h4>
                    <div id="itemInfo"></div>
                </div>
                <div class="info-card" style="border-left-color: #5856d6;">
                    <h4><i class="fas fa-plane"></i> マニアック・ポイント</h4>
                    <div id="maniaInfo"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const WORKER_URL = "https://trip.proluce.workers.dev";

    async function generate() {
        const dest = document.getElementById('destination').value;
        if(!dest) return alert("目的地を入力してください。");

        document.getElementById('loader').style.display = 'block';
        document.getElementById('planOutput').style.display = 'none';

        const prompt = `
以下の条件で、詳細な旅行プランを日本語のJSON形式のみで作成してください。
目的地: ${dest}, 期間: ${document.getElementById('duration').value}, 予算: ${document.getElementById('budget').value}, 要望: ${document.getElementById('notes').value}, 同行者: ${document.getElementById('who').value}

【JSON構造】
{
  "days": [
    { "day": 1, "title": "タイトル", "events": [{ "time": "09:00", "spot": "場所", "desc": "説明" }] }
  ],
  "budget_breakdown": ["交通費: 〇〇円", "食費: 〇〇円"],
  "items": ["アイテム1", "アイテム2"],
  "mania_point": "こだわりに関連したマニアックな一言"
}
`;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await response.json();
            
            // パース処理
            let aiText = data[0]?.generated_text?.replace("AI: ", "") || data.plan;
            const jsonPart = aiText.match(/\{[\s\S]*\}/)[0];
            const plan = JSON.parse(jsonPart);

            render(plan);
        } catch (e) {
            alert("エラーが発生しました。Workersの設定を確認してください。");
        } finally {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('planOutput').style.display = 'block';
        }
    }

    function render(plan) {
        // スケジュール描画
        document.getElementById('mainPlan').innerHTML = plan.days.map(d => `
            <div class="day-box">
                <div class="day-title">Day ${d.day}: ${d.title}</div>
                ${d.events.map(e => `
                    <div class="event">
                        <div class="time">${e.time}</div>
                        <div class="spot-info">
                            <span class="spot-name">${e.spot}</span>
                            <span class="spot-desc">${e.desc}</span>
                        </div>
                    </div>
                `).join('')}
            </div>
        `).join('');

        // サイド情報描画
        document.getElementById('budgetInfo').innerHTML = plan.budget_breakdown.map(b => `<div class="list-item">• ${b}</div>`).join('');
        document.getElementById('itemInfo').innerHTML = plan.items.map(i => `<div class="list-item">□ ${i}</div>`).join('');
        document.getElementById('maniaInfo').innerHTML = `<div class="list-item" style="color:var(--text-main); font-weight:700;">${plan.mania_point}</div>`;
    }
</script>

</body>
</html>
