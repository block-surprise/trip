<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURGE Travel - AI旅行計画</title>
    <style>
        :root { --primary: #0070f3; --bg: #f0f2f5; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; resize: vertical; }
        
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }

        #result { margin-top: 30px; padding: 20px; border-top: 2px solid #eee; line-height: 1.8; color: #444; }
        .loading { text-align: center; display: none; }
        
        /* Markdownっぽく見せるための簡易装飾 */
        .plan-content { white-space: pre-wrap; }
        .plan-content h3 { color: var(--primary); border-left: 4px solid var(--primary); padding-left: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 SURGE Travel</h1>
    
    <div class="input-group">
        <label>どんな旅行にしたいですか？</label>
        <textarea id="promptInput" placeholder="例：来月の週末、予算3万円で東京から行ける温泉旅行を計画して。食べ歩きもしたいな。"></textarea>
    </div>

    <button id="generateBtn" onclick="sendToAI()">AIにプランを作成させる</button>

    <div id="loading" class="loading">🚢 最高のルートを計算中...</div>
    <div id="result"></div>
</div>

<script>
    // あなたがデプロイしたCloudflare WorkersのURLに書き換えてください
    const WORKER_URL = "https://your-worker-name.workers.dev";

    async function sendToAI() {
        const prompt = document.querySelector('#promptInput').value;
        const btn = document.querySelector('#generateBtn');
        const resultDiv = document.querySelector('#result');
        const loading = document.querySelector('#loading');

        if (!prompt) return alert("要望を入力してください！");

        // 状態のリセット
        btn.disabled = true;
        loading.style.display = "block";
        resultDiv.innerHTML = "";

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            const data = await response.json();

            if (data.error) {
                resultDiv.innerHTML = `<p style="color:red;">エラー: ${data.error}</p>`;
            } else {
                // AIの回答を表示（簡易的に整形）
                resultDiv.innerHTML = `<h2>📋 提案されたプラン</h2><div class="plan-content">${data.plan}</div>`;
            }
        } catch (err) {
            resultDiv.innerHTML = `<p style="color:red;">通信に失敗しました。</p>`;
        } finally {
            btn.disabled = false;
            loading.style.display = "none";
        }
    }
</script>

</body>
</html>
