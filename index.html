<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURGE Travel | Intelligent Concierge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f1012;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-color: #0071e3;
            --accent-glow: rgba(0, 113, 227, 0.4);
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --radius-xl: 28px;
            --radius-md: 18px;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a1c20 0%, #0f1012 100%);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 60px; }
        header h1 { 
            font-size: 56px; font-weight: 800; margin: 0; 
            background: linear-gradient(135deg, #fff 0%, #a1a1a6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }
        header p { color: var(--text-secondary); font-size: 18px; margin-top: 10px; font-weight: 500; }

        /* Bento Input UI */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 60px;
        }

        .bento-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-xl);
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bento-card:hover { transform: translateY(-5px); border-color: var(--accent-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .bento-card label {
            display: block; font-size: 11px; font-weight: 800; color: var(--accent-color);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px;
        }

        input, select, textarea {
            width: 100%; border: none; background: transparent; font-size: 18px; 
            font-weight: 600; color: var(--text-primary); outline: none; font-family: inherit;
        }
        textarea { height: 60px; resize: none; }

        .col-2 { grid-column: span 2; }
        .col-3 { grid-column: span 3; }

        .btn-generate {
            grid-column: span 1;
            background: var(--accent-color);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; border: none; transition: 0.4s;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-generate i { font-size: 28px; color: white; }
        .btn-generate:hover { transform: scale(0.95); box-shadow: 0 0 40px var(--accent-glow); }
        .btn-generate:disabled { background: #333; box-shadow: none; cursor: wait; }

        /* Results Area */
        #resultArea { display: none; }
        .plan-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }

        .main-itinerary { display: flex; flex-direction: column; gap: 24px; }
        .day-container {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 35px;
            border: 1px solid var(--card-border);
        }
        .day-header { font-size: 28px; font-weight: 800; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        .day-header span { color: var(--accent-color); font-size: 16px; border: 2px solid var(--accent-color); padding: 4px 12px; border-radius: 50px; }

        .timeline-item {
            position: relative; padding-left: 40px; margin-bottom: 35px;
        }
        .timeline-item::before {
            content: ''; position: absolute; left: 6px; top: 8px; width: 12px; height: 12px;
            background: var(--accent-color); border-radius: 50%; box-shadow: 0 0 10px var(--accent-color);
        }
        .timeline-item::after {
            content: ''; position: absolute; left: 11px; top: 25px; width: 2px; height: calc(100% + 15px);
            background: var(--card-border);
        }
        .timeline-item:last-child::after { display: none; }

        .item-time { font-weight: 800; color: var(--accent-color); font-size: 14px; margin-bottom: 4px; display: block; }
        .item-spot { font-size: 20px; font-weight: 700; display: block; margin-bottom: 8px; }
        .item-desc { color: var(--text-secondary); font-size: 15px; line-height: 1.6; }

        /* Sidebar Info */
        .side-panel { display: flex; flex-direction: column; gap: 20px; }
        .side-card {
            background: rgba(255,255,255,0.03);
            border-radius: var(--radius-md);
            padding: 24px;
            border: 1px solid var(--card-border);
        }
        .side-card h4 { margin: 0 0 15px 0; font-size: 14px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; }

        .check-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 14px; color: var(--text-secondary); }
        .check-item i { color: #34c759; font-size: 12px; }

        /* Loader */
        #loader { display: none; text-align: center; padding: 100px 0; }
        .surge-loader {
            width: 60px; height: 60px; border: 5px solid var(--card-border); border-top-color: var(--accent-color);
            border-radius: 50%; animation: spin 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite; margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .bento-grid, .plan-layout { grid-template-columns: 1fr; }
            .col-2, .col-3 { grid-column: span 1; }
            header h1 { font-size: 40px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SURGE Travel</h1>
        <p>次世代AIが描く、あなただけの旅路</p>
    </header>

    <div class="bento-grid">
        <div class="bento-card col-2">
            <label><i class="fas fa-map-marker-alt"></i> 目的地</label>
            <input type="text" id="dest" placeholder="例：東京、羽田空港、金沢など">
        </div>
        <div class="bento-card">
            <label><i class="fas fa-calendar-alt"></i> 期間</label>
            <select id="duration">
                <option value="日帰り">日帰り</option>
                <option value="1泊2日" selected>1泊2日</option>
                <option value="2泊3日">2泊3日</option>
            </select>
        </div>
        <div class="bento-card">
            <label><i class="fas fa-wallet"></i> 予算</label>
            <select id="budget">
                <option value="節約（学生向け）">節約（学生）</option>
                <option value="標準">標準</option>
                <option value="贅沢">贅沢</option>
            </select>
        </div>
        <div class="bento-card col-3">
            <label><i class="fas fa-heart"></i> こだわり・趣味</label>
            <textarea id="notes" placeholder="例：0.5mmのシャーペンが充実した店、空港の展望デッキ、静かなカフェ..."></textarea>
        </div>
        <button class="btn-generate" id="runBtn" onclick="generate()">
            <i class="fas fa-wand-magic-sparkles"></i>
        </button>
    </div>

    <div id="loader">
        <div class="surge-loader"></div>
        <p style="font-weight: 600; color: var(--accent-color); letter-spacing: 1px;">SURGE AI IS COMPUTING...</p>
    </div>

    <div id="resultArea">
        <div class="plan-layout">
            <div id="mainPlan" class="main-itinerary"></div>
            <div class="side-panel">
                <div class="side-card">
                    <h4><i class="fas fa-coins"></i> 予算内訳</h4>
                    <div id="budgetBox"></div>
                </div>
                <div class="side-card">
                    <h4><i class="fas fa-clipboard-check"></i> 推奨持ち物</h4>
                    <div id="itemBox"></div>
                </div>
                <div class="side-card" style="border-left: 4px solid var(--accent-color);">
                    <h4><i class="fas fa-star"></i> SURGEマニア・ノート</h4>
                    <div id="maniaBox" style="font-size: 14px; line-height: 1.7;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const WORKER_URL = "https://trip.proluce.workers.dev";

    async function generate() {
        const destination = document.getElementById('dest').value;
        if(!destination) return alert("目的地を入力してください。");

        const btn = document.getElementById('runBtn');
        const loader = document.getElementById('loader');
        const result = document.getElementById('resultArea');

        btn.disabled = true;
        loader.style.display = 'block';
        result.style.display = 'none';

        const prompt = `
以下の旅行プランを日本語のJSON形式で作成してください。
目的地: ${destination}, 期間: ${document.getElementById('duration').value}, 予算: ${document.getElementById('budget').value}, 要望: ${document.getElementById('notes').value}

【JSON構造】
{
  "days": [{ "day": 1, "title": "タイトル", "events": [{ "time": "09:00", "spot": "場所", "desc": "説明" }] }],
  "budget_breakdown": ["交通費: 〇〇円", "食費: 〇〇円"],
  "items": ["アイテム1", "アイテム2"],
  "mania_point": "ユーザーのこだわりを反映した専門的アドバイス"
}
`;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            const data = await response.json();
            
            // どんな返し方でもJSONを探し出すロジック
            let aiText = data.plan || (Array.isArray(data) ? data[0].generated_text : JSON.stringify(data));
            const jsonMatch = aiText.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error("JSON形式の回答が得られませんでした。");
            
            const plan = JSON.parse(jsonMatch[0]);
            render(plan);

            loader.style.display = 'none';
            result.style.display = 'block';
        } catch (e) {
            console.error(e);
            alert("エラーが発生しました。コンソールを確認してください。");
            loader.style.display = 'none';
        } finally {
            btn.disabled = false;
        }
    }

    function render(plan) {
        // スケジュール
        document.getElementById('mainPlan').innerHTML = plan.days.map(d => `
            <div class="day-container">
                <div class="day-header"><span>DAY ${d.day}</span> ${d.title}</div>
                ${d.events.map(e => `
                    <div class="timeline-item">
                        <span class="item-time">${e.time}</span>
                        <span class="item-spot">${e.spot}</span>
                        <p class="item-desc">${e.desc}</p>
                    </div>
                `).join('')}
            </div>
        `).join('');

        // サイドバー
        document.getElementById('budgetBox').innerHTML = plan.budget_breakdown.map(b => `<div class="check-item"><i class="fas fa-check-circle"></i> ${b}</div>`).join('');
        document.getElementById('itemBox').innerHTML = plan.items.map(i => `<div class="check-item"><i class="fas fa-shopping-cart"></i> ${i}</div>`).join('');
        document.getElementById('maniaBox').innerText = plan.mania_point;
    }
</script>

</body>
</html>
