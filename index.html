<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURGE Travel | White Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f5f7fa;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: #ffffff;
            --accent-color: #0071e3;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --radius-xl: 24px;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(at 0% 0%, hsla(210,100%,90%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(225,100%,90%,1) 0, transparent 50%);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            margin: 0; padding: 40px 20px; min-height: 100vh;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 50px; }
        header h1 { font-size: 42px; font-weight: 800; margin: 0; color: var(--text-primary); letter-spacing: -1px; }
        header p { color: var(--text-secondary); font-size: 16px; margin-top: 8px; }

        /* Bento Grid */
        .bento-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px;
        }

        .bento-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 2px solid var(--card-border);
            border-radius: var(--radius-xl);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        .bento-card label {
            display: block; font-size: 11px; font-weight: 800; color: var(--accent-color);
            text-transform: uppercase; margin-bottom: 8px;
        }

        input, select, textarea {
            width: 100%; border: none; background: transparent; font-size: 16px; 
            font-weight: 600; color: var(--text-primary); outline: none; font-family: inherit;
        }

        .col-2 { grid-column: span 2; }
        .col-4 { grid-column: span 4; }

        .btn-generate {
            grid-column: span 4; background: var(--accent-color); color: white;
            border-radius: var(--radius-xl); padding: 18px; border: none;
            font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,113,227,0.3);
        }
        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,113,227,0.4); }

        /* Results Area */
        #resultArea { display: none; margin-top: 40px; }
        .day-box {
            background: white; border-radius: var(--radius-xl); padding: 30px;
            margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }
        .day-title { font-size: 24px; font-weight: 800; color: var(--accent-color); margin-bottom: 20px; }

        .event { display: flex; gap: 20px; margin-bottom: 20px; border-left: 3px solid #eee; padding-left: 20px; }
        .time { font-weight: 800; color: var(--text-primary); min-width: 60px; }
        .spot-name { font-weight: 700; font-size: 17px; display: block; }
        .spot-desc { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .info-card { background: #fff; padding: 20px; border-radius: var(--radius-xl); border-top: 4px solid var(--accent-color); }
        .info-card h4 { margin: 0 0 10px 0; font-size: 15px; color: var(--accent-color); }

        /* Loader */
        #loader { display: none; text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) { .bento-grid { grid-template-columns: 1fr; } .col-2, .col-4 { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SURGE Travel</h1>
        <p>AIが創る、洗練された旅のインテリジェンス</p>
    </header>

    <div class="bento-grid">
        <div class="bento-card col-2">
            <label>目的地</label>
            <input type="text" id="dest" placeholder="どこへ行きますか？">
        </div>
        <div class="bento-card">
            <label>日数</label>
            <select id="duration">
                <option value="1日">日帰り</option>
                <option value="1泊2日" selected>1泊2日</option>
                <option value="2泊3日">2泊3日</option>
            </select>
        </div>
        <div class="bento-card">
            <label>予算</label>
            <select id="budget">
                <option value="学生・節約">節約</option>
                <option value="標準">標準</option>
                <option value="贅沢">贅沢</option>
            </select>
        </div>
        <div class="bento-card col-4">
            <label>こだわり（観光地、空港、撮影スポットなど）</label>
            <textarea id="notes" placeholder="例：静かな喫茶店、滑走路が見える場所..."></textarea>
        </div>
        <button class="btn-generate" id="runBtn" onclick="generate()">旅行プランを生成する</button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p>SURGE AI が解析中...</p>
    </div>

    <div id="resultArea">
        <div id="mainPlan"></div>
        <div class="info-grid">
            <div class="info-card"><h4><i class="fas fa-coins"></i> 予算目安</h4><div id="budgetBox"></div></div>
            <div class="info-card"><h4><i class="fas fa-briefcase"></i> 持ち物</h4><div id="itemBox"></div></div>
            <div class="info-card"><h4><i class="fas fa-lightbulb"></i> マニア・ノート</h4><div id="maniaBox"></div></div>
        </div>
    </div>
</div>

<script>
    const WORKER_URL = "https://trip.proluce.workers.dev";

    async function generate() {
        const destination = document.getElementById('dest').value;
        if(!destination) return alert("目的地を入力してください。");

        const btn = document.getElementById('runBtn');
        const loader = document.getElementById('loader');
        const result = document.getElementById('resultArea');

        btn.disabled = true;
        loader.style.display = 'block';
        result.style.display = 'none';

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    prompt: `${destination}への旅行。期間:${document.getElementById('duration').value}。予算:${document.getElementById('budget').value}。要望:${document.getElementById('notes').value}。必ずJSON形式で出力。`
                })
            });

            const rawData = await response.json();
            console.log("Received:", rawData);

            // データの抽出 (planキー、または全体からJSONを探す)
            let aiText = rawData.plan || (Array.isArray(rawData) ? rawData[0].generated_text : JSON.stringify(rawData));
            
            // 強力なJSON抽出ロジック
            const startIdx = aiText.indexOf('{');
            const endIdx = aiText.lastIndexOf('}');
            if (startIdx === -1 || endIdx === -1) throw new Error("AIの返答にJSONが含まれていませんでした。");
            
            const jsonString = aiText.substring(startIdx, endIdx + 1);
            const plan = JSON.parse(jsonString);

            render(plan);
            loader.style.display = 'none';
            result.style.display = 'block';

        } catch (e) {
            console.error(e);
            alert("解析に失敗しました。AIが正しくJSONを返せなかった可能性があります。\nエラー: " + e.message);
            loader.style.display = 'none';
        } finally {
            btn.disabled = false;
        }
    }

    function render(plan) {
        document.getElementById('mainPlan').innerHTML = (plan.days || []).map(d => `
            <div class="day-box">
                <div class="day-title">Day ${d.day}: ${d.title}</div>
                ${(d.events || []).map(e => `
                    <div class="event">
                        <div class="time">${e.time}</div>
                        <div class="spot-info">
                            <span class="spot-name">${e.spot}</span>
                            <span class="spot-desc">${e.desc}</span>
                        </div>
                    </div>
                `).join('')}
            </div>
        `).join('');

        document.getElementById('budgetBox').innerHTML = (plan.budget_breakdown || []).map(b => `<div style="font-size:14px; margin-bottom:5px;">• ${b}</div>`).join('');
        document.getElementById('itemBox').innerHTML = (plan.items || []).map(i => `<div style="font-size:14px; margin-bottom:5px;">□ ${i}</div>`).join('');
        document.getElementById('maniaBox').innerText = plan.mania_point || "なし";
    }
</script>

</body>
</html>
