<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800;900&family=Noto+Sans+JP:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#ffffff;
    --text:#1d1d1f;
    --sub:#86868b;
    --accent:#0071e3;
    --light:#f5f5f7;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans JP',sans-serif;
    line-height:2;
    -webkit-font-smoothing:antialiased;
}

nav{
    position:sticky;
    top:0;
    z-index:999;
    padding:16px 5%;
    background:rgba(255,255,255,0.82);
    backdrop-filter:blur(20px);
    border-bottom:1px solid #f2f2f7;
}

.logo{
    text-decoration:none;
    color:#000;
    font-family:'Plus Jakarta Sans';
    font-weight:900;
    font-size:20px;
}

.header{
    max-width:880px;
    margin:0 auto;
    text-align:center;
    padding:95px 5% 50px;
}

.category{
    color:#ff3b30;
    letter-spacing:2px;
    font-size:13px;
    font-weight:800;
    font-family:'Plus Jakarta Sans';
}

h1{
    font-size:clamp(36px,6vw,58px);
    line-height:1.18;
    margin:20px 0;
    font-weight:900;
    letter-spacing:-1.2px;
}

.date{
    color:#86868b;
}

.hero{
    max-width:1150px;
    margin:0 auto 80px;
    padding:0 5%;
}

.hero img{
    width:100%;
    height:540px;
    object-fit:cover;
    border-radius:34px;
    box-shadow:0 20px 50px rgba(0,0,0,0.12);
}

.content{
    max-width:780px;
    margin:0 auto;
    padding:0 5%;
    font-size:17px;
}

.content h2{
    font-size:31px;
    margin:75px 0 25px;
    font-weight:900;
}

.quote{
    margin:70px 0;
    font-size:30px;
    line-height:1.7;
    font-weight:900;
}

.info-box{
    background:#f5f5f7;
    border-radius:26px;
    padding:34px;
    margin:50px 0;
}

.cta{
    margin:100px 0;
    padding:65px 35px;
    border-radius:36px;
    background:linear-gradient(135deg,#f5f5f7,#ececf1);
    text-align:center;
}

.btn{
    display:inline-block;
    margin-top:28px;
    padding:18px 46px;
    border-radius:999px;
    background:#0071e3;
    color:white;
    text-decoration:none;
    font-weight:800;
}

footer{
    margin-top:90px;
    padding:55px 5%;
    border-top:1px solid #f2f2f7;
    text-align:center;
    color:#86868b;
}

</style>

<title>雨の日の京都は、むしろ正解だった。</title>
</head>

<body>

<nav>
    <a href="/" class="logo">SURGE Travel</a>
</nav>

<header class="header">
    <div class="category">SLOW TRAVEL</div>

    <h1>
        雨の日の京都は、<br>
        むしろ正解だった。
    </h1>

    <div class="date">
        2026.05.30 公開
    </div>
</header>

<div class="hero">
    <img src="https://images.unsplash.com/photo-1516483638261-f4dbaf036963?auto=format&fit=crop&w=1400&q=80" alt="雨の京都">
</div>

<div class="content">

    <p>
        旅行の日程を決めるとき、私たちは無意識のうちに晴れを期待しています。
    </p>

    <div class="quote">
        晴れの日の旅は景色を覚える。<br>
        雨の日の旅は空気を覚える。
    </div>

    <h2>人が減ると、街の表情が変わる。</h2>

    <p>
        雨の日の京都は、石畳の色も緑の深さも変わります。
    </p>

    <div class="info-box">
        💡 SURGE Tips<br>
        雨の日は人気観光地も比較的静かになります。
    </div>

    <div class="cta">
        <h2>天気予報だけで、旅の価値を決めない。</h2>

        <p>
            SURGE AIが雨の日ならではの過ごし方を提案します。
        </p>

        <a href="https://trip.surge.f5.si/planner" class="btn">
            雨の日プランを生成する
        </a>
    </div>

</div>

<footer>
© 2026 SURGE Travel Project.
</footer>

</body>
</html>
