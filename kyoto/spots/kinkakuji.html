<title>金閣寺 | あっ、京都</title>
<h1>金閣寺</h1>
<p>黄金に輝く京都の象徴</p>
<h2>金閣寺とは？</h2>
<p>
正式名称は鹿苑寺（ろくおんじ）。
室町幕府三代将軍・足利義満によって建てられました。

鏡湖池に映る金閣の姿は、
京都を代表する景色として知られています。

</p>
<h2>見どころ</h2>
<p>
・金箔で覆われた舎利殿<br>
・鏡湖池に映る逆さ金閣<br>
・四季によって変わる庭園
</p>
<h2>おすすめ写真スポット</h2>
<p>
池越しに見る金閣寺が定番。
特に晴れた日は水面への反射が美しいです。
</p>
<h2>おすすめの季節</h2>
<p>
春の新緑、秋の紅葉、
そして冬の雪化粧は特に人気があります。
</p>
<h2>周辺グルメ</h2>
<p>
抹茶スイーツや京だんごなど、
京都らしい和スイーツを楽しめます。
</p>
