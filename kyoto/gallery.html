```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>京都写真集 | あっ、京都</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:"Yu Mincho",serif;
background:#000;
}

.slide{
position:absolute;
inset:0;
opacity:0;
animation:fade 60s infinite;
}

.slide::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
z-index:1;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
animation:zoom 15s linear infinite;
}

.text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
z-index:2;
width:90%;
}

.text h2{
font-size:clamp(3rem,8vw,7rem);
letter-spacing:8px;
margin-bottom:20px;
}

.text p{
font-size:clamp(1rem,2vw,1.5rem);
line-height:2;
}

.slide:nth-child(1){
animation-delay:0s;
}

.slide:nth-child(2){
animation-delay:10s;
}

.slide:nth-child(3){
animation-delay:20s;
}

.slide:nth-child(4){
animation-delay:30s;
}

.slide:nth-child(5){
animation-delay:40s;
}

.slide:nth-child(6){
animation-delay:50s;
}

@keyframes fade{

0%{
opacity:0;
}

5%{
opacity:1;
}

15%{
opacity:1;
}

20%{
opacity:0;
}

100%{
opacity:0;
}

}

@keyframes zoom{

from{
transform:scale(1);
}

to{
transform:scale(1.15);
}

}

.home{
position:fixed;
top:25px;
left:25px;
z-index:999;
padding:12px 25px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
border-radius:999px;
text-decoration:none;
color:white;
font-weight:bold;
}

.progress{
position:fixed;
bottom:0;
left:0;
height:4px;
background:white;
animation:progress 60s linear infinite;
z-index:999;
}

@keyframes progress{

from{
width:0%;
}

to{
width:100%;
}

}

.end-message{

position:absolute;
bottom:70px;
left:50%;
transform:translateX(-50%);
z-index:999;
color:white;
font-size:1rem;
letter-spacing:4px;
opacity:.8;

}

@media(max-width:768px){

.text h2{
letter-spacing:3px;
}

}

</style>
</head>
<body>

<a href="index.html" class="home">
← あっ、京都へ戻る
</a>

<div class="slide">

<img src="images/kyoto1.jpg">

<div class="text">
<h2>京都</h2>
<p>
千年の時間が流れる街
</p>
</div>

</div>

<div class="slide">

<img src="images/spring.jpg">

<div class="text">
<h2>春</h2>
<p>
桜が風に舞う季節
</p>
</div>

</div>

<div class="slide">

<img src="images/summer.jpg">

<div class="text">
<h2>夏</h2>
<p>
祭りの熱気と夕暮れ
</p>
</div>

</div>

<div class="slide">

<img src="images/autumn.jpg">

<div class="text">
<h2>秋</h2>
<p>
燃えるような紅葉
</p>
</div>

</div>

<div class="slide">

<img src="images/winter.jpg">

<div class="text">
<h2>冬</h2>
<p>
静寂に包まれる古都
</p>
</div>

</div>

<div class="slide">

<img src="images/kiyomizu.jpg">

<div class="text">
<h2>また、京都へ。</h2>
<p>
あなたの次の旅を待っています
</p>
</div>

</div>

<div class="progress"></div>

<div class="end-message">
KYOTO CINEMATIC COLLECTION
</div>

</body>
</html>
