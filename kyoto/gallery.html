<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>京都写真集 | あっ、京都</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:"Yu Mincho",serif;
}

.slide{
position:absolute;
inset:0;
opacity:0;
transition:opacity 2s ease;
}

.slide.active{
opacity:1;
z-index:2;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
animation:kenburns 10s linear forwards;
}

@keyframes kenburns{

from{
transform:scale(1);
}

to{
transform:scale(1.12);
}

}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
}

.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
z-index:5;
width:90%;
}

.content h1{
font-size:clamp(3rem,8vw,7rem);
margin-bottom:20px;
letter-spacing:6px;
}

.content p{
font-size:clamp(1rem,2vw,1.4rem);
line-height:2;
}

.home{
position:fixed;
top:25px;
left:25px;
z-index:999;

padding:12px 24px;

background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);

border-radius:999px;

color:white;
text-decoration:none;
}

.counter{
position:fixed;
bottom:30px;
right:30px;

z-index:999;

color:white;

font-size:1rem;
letter-spacing:2px;
}

@media(max-width:768px){

.content h1{
font-size:3rem;
letter-spacing:2px;
}

.content p{
font-size:1rem;
}

}

</style>
</head>
<body>

<a href="index.html" class="home">
← あっ、京都へ戻る
</a>

<!-- 1 -->

<div class="slide active">

<img src="images/kyoto1.jpg">

<div class="overlay"></div>

<div class="content">
<h1>京都</h1>
<p>千年の時間が流れる街</p>
</div>

</div>

<!-- 2 -->

<div class="slide">

<img src="images/spring.jpg">

<div class="overlay"></div>

<div class="content">
<h1>春</h1>
<p>桜が風に舞う季節</p>
</div>

</div>

<!-- 3 -->

<div class="slide">

<img src="images/summer.jpg">

<div class="overlay"></div>

<div class="content">
<h1>夏</h1>
<p>祭りの熱気と夕暮れ</p>
</div>

</div>

<!-- 4 -->

<div class="slide">

<img src="images/autumn.jpg">

<div class="overlay"></div>

<div class="content">
<h1>秋</h1>
<p>燃えるような紅葉</p>
</div>

</div>

<!-- 5 -->

<div class="slide">

<img src="images/winter.jpg">

<div class="overlay"></div>

<div class="content">
<h1>冬</h1>
<p>静寂に包まれる古都</p>
</div>

</div>

<!-- 6 -->

<div class="slide">

<img src="images/kiyomizu.jpg">

<div class="overlay"></div>

<div class="content">
<h1>また、京都へ。</h1>
<p>あなたの次の旅を待っています</p>
</div>

</div>

<div class="counter">
<span id="page">1</span> / 6
</div>

<script>

const slides =
document.querySelectorAll(".slide");

const page =
document.getElementById("page");

let current = 0;

setInterval(()=>{

slides[current].classList.remove("active");

current++;

if(current >= slides.length){
current = 0;
}

slides[current].classList.add("active");

page.textContent =
current + 1;

},10000);

</script>

</body>
</html>
